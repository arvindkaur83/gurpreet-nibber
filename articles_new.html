<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles - Gurpreet Singh Nibber</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="navbar"></div>

  <section class="hero">
    <div class="hero-content">
      <h1>Articles by Gurpreet Singh Nibber</h1>
      <p>Explore his latest writings and insights</p>
      <button>View Articles</button>
    </div>
  </section>

  <section class="page-content articles">
  <h2>Articles</h2>

  <!-- 🔍 Search Box -->
  <input 
    type="text" 
    id="keywordSearch" 
    placeholder="Type keyword (e.g., Badal, Agriculture, Place)" 
    style="margin-bottom:20px; padding:8px; width:100%; max-width:400px;"
  >

  <!-- 📰 Dynamic Articles -->
  <div class="cards" id="articlesContainer">
    <!-- Articles will load here dynamically -->
  </div>
</section>

  <div id="footer"></div>

  <script src="script.js"></script>
</body>
</html>
