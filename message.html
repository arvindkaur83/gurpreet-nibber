
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Message - Gurpreet Singh Nibber</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="navbar"></div>

  <!-- MESSAGE SECTION (Styled like Articles) -->
  <section class="page-content articles" id="messageSection">
    <h2>Contact Form</h2>

    <div class="cards">
      <div class="card">
        <form id="contactForm" class="contact-form">
          <input type="text" id="name" placeholder="Your Name" required>
          <input type="text" id="contact" placeholder="Contact Number" required>
          <input type="email" id="email" placeholder="Email Address" required>
          <textarea 
          id="message" 
          placeholder="Your Message"
          maxlength="500"
          required>
          </textarea>

<p id="charCount">0 / 500</p>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <div id="footer"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app-check.js"></script>
<!-- Private config (local only) -->
<script src="config.js"></script>


<!-- Firebase init -->
<script src="firebase.js"></script>

<!-- Your main script -->
<script src="script.js"></script>

</body>
</html>
